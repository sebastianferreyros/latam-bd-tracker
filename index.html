let sk="lastActivity",sd="desc",as="All";
const active=RAW.filter(d=>!["10. Disqualified","9. Disengaged"].includes(d.stage)).length;
document.getElementById("meta").textContent=`${RAW.length} deals · ${active} active · Synced ${LAST_SYNCED}`;

function buildFilters(){
  const ow=["All",...new Set(RAW.map(d=>d.owner).filter(Boolean))].sort();
  const ct=["All",...new Set(RAW.map(d=>d.country).filter(Boolean))].sort();
  const st=["All",...SO.filter(s=>RAW.some(d=>d.stage===s))];
  document.getElementById("of").innerHTML=ow.map(o=>`<option value="${o}">${o==="All"?"All owners":o}</option>`).join("");
  document.getElementById("cf").innerHTML=ct.map(c=>`<option value="${c}">${c==="All"?"All countries":c}</option>`).join("");
  document.getElementById("sf").innerHTML=st.map(s=>`<option value="${s}">${s==="All"?"All stages":s}</option>`).join("");
}

function buildSbar(){
  const cnt={};RAW.forEach(d=>{cnt[d.stage]=(cnt[d.stage]||0)+1;});
  document.getElementById("sbar").innerHTML=SO.filter(s=>cnt[s]).map(s=>{
    const c=SC[s]||{bg:"#1a1a1a",t:"#9ca3af",d:"#4b5563"};
    return`<button class="sc${as===s?" on":""}" data-s="${s}" onclick="ts('${s}')" style="color:${c.t};${as===s?`background:${c.bg};border-color:${c.t};`:""}">${s}<span class="cc" style="background:${c.d}">${cnt[s]}</span></button>`;
  }).join("");
}

function ts(s){as=as===s?"All":s;document.getElementById("sf").value=as;buildSbar();render();}

function gf(){
  const q=document.getElementById("search").value.toLowerCase();
  const p=document.getElementById("pf").value,c=document.getElementById("cf").value,o=document.getElementById("of").value,s=document.getElementById("sf").value;
  return RAW.filter(d=>p==="All"||d.pipeline===p).filter(d=>c==="All"||d.country===c).filter(d=>o==="All"||d.owner===o).filter(d=>(s==="All"||d.stage===s)&&(as==="All"||d.stage===as)).filter(d=>!q||[d.company,d.deal,d.useCase,d.owner,d.notes,d.country].join(" ").toLowerCase().includes(q)).sort((a,b)=>{let av=sk==="stage"?SO.indexOf(a.stage):(a[sk]||""),bv=sk==="stage"?SO.indexOf(b.stage):(b[sk]||"");return av<bv?(sd==="asc"?-1:1):av>bv?(sd==="asc"?1:-1):0;});
}

function sb(k){if(sk===k)sd=sd==="asc"?"desc":"asc";else{sk=k;sd="asc";}render();}
function ar(c){if(sk!==c)return`<span style="opacity:.2;font-size:9px"> ⇅</span>`;return sd==="asc"?`<span style="font-size:9px;color:var(--accent)"> ↑</span>`:`<span style="font-size:9px;color:var(--accent)"> ↓</span>`;}

function render(){
  const data=gf(),wrap=document.getElementById("tw");
  if(!data.length){wrap.innerHTML=`<div class="empty">No deals match your filters.</div>`;document.getElementById("tally").textContent="";return;}
  const cols=[{k:"company",l:"Company",w:"13%"},{k:"pipeline",l:"Pipeline",w:"10%"},{k:"useCase",l:"Use case",w:"11%"},{k:"owner",l:"Owner",w:"9%"},{k:"stage",l:"Stage",w:"12%"},{k:"country",l:"Country",w:"7%"},{k:"region",l:"Region",w:"6%"},{k:"lastActivity",l:"Last activity",w:"9%"},{k:"notes",l:"Notes",w:"23%"}];
  const thead=`<thead><tr>${cols.map(c=>`<th onclick="sb('${c.k}')" style="width:${c.w}">${c.l}${ar(c.k)}</th>`).join("")}</tr></thead>`;
  const tbody=data.map(d=>{
    const c=SC[d.stage]||{bg:"#1a1a1a",t:"#9ca3af",d:"#4b5563"};
    const pc=PC[d.pipeline]||{bg:"rgba(100,100,100,.1)",t:"#9ca3af"};
    const badge=`<span class="badge" style="background:${c.bg};color:${c.t}"><span class="bd" style="background:${c.d}"></span>${d.stage||"—"}</span>`;
    const pip=`<span class="pb" style="background:${pc.bg};color:${pc.t}">${d.pipeline==="World ID Integrations"?"Integrations":"Rewards"}</span>`;
    const lnk=d.link?`<a class="lnk" href="${d.link}" target="_blank" rel="noreferrer">↗</a>`:"";
    return`<tr><td class="cp">${lnk}${d.company||"—"}</td><td>${pip}</td><td class="cm" title="${d.useCase||""}">${d.useCase||"—"}</td><td class="cm">${d.owner||"—"}</td><td>${badge}</td><td class="cm">${d.country||"—"}</td><td class="cd">${d.region||"—"}</td><td class="cd">${d.lastActivity||"—"}</td><td class="cn" title="${(d.notes||"").replace(/"/g,"&quot;")}">${d.notes||"—"}</td></tr>`;
  }).join("");
  wrap.innerHTML=`<table><colgroup>${cols.map(c=>`<col style="width:${c.w}">`).join("")}</colgroup>${thead}<tbody>${tbody}</tbody></table>`;
  document.getElementById("tally").textContent=`Showing ${data.length} of ${RAW.length} deals`;
}

function exportCSV(){
  const data=gf();
  const h=["Company","Deal","Pipeline","Use Case","Owner","Stage","Country","Region","Last Activity","Notes","HubSpot Link"];
  const rows=data.map(d=>[`"${d.company}"`,`"${d.deal}"`,d.pipeline,`"${d.useCase}"`,d.owner,d.stage,d.country,d.region,d.lastActivity,`"${(d.notes||"").replace(/"/g,'""')}"`,d.link]);
  const csv=[h,...rows].map(r=>r.join(",")).join("\n");
  const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  const a=document.createElement("a");a.href=url;a.download=`latam_bd_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);
}

buildFilters();buildSbar();render();
