let sk="lastEngagement",sd="desc",as="All";
const active=RAW.filter(d=>d.stage&&!["10. Disqualified","9. Disengaged"].includes(d.stage)).length;
document.getElementById("meta").textContent=RAW.length+" opportunities - "+active+" active - Synced "+LAST_SYNCED;

function daysSince(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr),now=new Date();
  return Math.floor((now-d)/(1000*60*60*24));
}

function engagementColor(dateStr){
  const days=daysSince(dateStr);
  if(days===null) return "ns";
  if(days<=14) return "ok";
  if(days<=30) return "warn";
  return "stale";
}

function buildFilters(){
  const ow=["All",...new Set(RAW.map(d=>d.owner).filter(Boolean))].sort();
  const ct=["All",...new Set(RAW.map(d=>d.country).filter(Boolean))].sort();
  const uc=["All",...new Set(RAW.map(d=>d.useCase).filter(Boolean))].sort();
  const pr=["All","P0 (Critical)","P1 (High Prio)","P2 (Medium Prio)","P3 (Low Prio)"].filter(p=>p==="All"||RAW.some(d=>d.priority===p));
  const st=["All",...SO.filter(s=>RAW.some(d=>d.stage===s))];
  document.getElementById("of").innerHTML=ow.map(o=>`<option value="${o}">${o==="All"?"All owners":o}</option>`).join("");
  document.getElementById("cf").innerHTML=ct.map(c=>`<option value="${c}">${c==="All"?"All countries":c}</option>`).join("");
  document.getElementById("uf").innerHTML=uc.map(u=>`<option value="${u}">${u==="All"?"All use cases":u}</option>`).join("");
  document.getElementById("prf").innerHTML=pr.map(p=>`<option value="${p}">${p==="All"?"All priorities":p}</option>`).join("");
  document.getElementById("sf").innerHTML=st.map(s=>`<option value="${s}">${s==="All"?"All stages":s}</option>`).join("");
}

function buildSbar(){
  const cnt={};RAW.forEach(d=>{if(d.stage)cnt[d.stage]=(cnt[d.stage]||0)+1;});
  document.getElementById("sbar").innerHTML=SO.filter(s=>cnt[s]).map(s=>{
    const c=SC[s]||{bg:"#1a1a1a",t:"#9ca3af",d:"#4b5563"};
    return`<button class="sc${as===s?" on":""}" data-s="${s}" onclick="ts('${s}')" style="color:${c.t};${as===s?`background:${c.bg};border-color:${c.t};`:""}">${s}<span class="cc" style="background:${c.d}">${cnt[s]}</span></button>`;
  }).join("");
}

function ts(s){as=as===s?"All":s;document.getElementById("sf").value=as;buildSbar();render();}

function gf(){
  const q=document.getElementById("search").value.toLowerCase();
  const u=document.getElementById("uf").value,c=document.getElementById("cf").value;
  const o=document.getElementById("of").value,pr=document.getElementById("prf").value;
  const s=document.getElementById("sf").value,inc=document.getElementById("incf").value;
  return RAW
    .filter(d=>u==="All"||d.useCase===u)
    .filter(d=>c==="All"||d.country===c)
    .filter(d=>o==="All"||d.owner===o)
    .filter(d=>pr==="All"||d.priority===pr)
    .filter(d=>(s==="All"||d.stage===s)&&(as==="All"||d.stage===as))
    .filter(d=>inc==="All"||d.incentive===inc)
    .filter(d=>!q||[d.company,d.deal,d.useCase,d.owner,d.notes,d.incentiveDesc,d.country].join(" ").toLowerCase().includes(q))
    .sort((a,b)=>{
      let av=sk==="stage"?SO.indexOf(a.stage||""):(a[sk]||"");
      let bv=sk==="stage"?SO.indexOf(b.stage||""):(b[sk]||"");
      return av<bv?(sd==="asc"?-1:1):av>bv?(sd==="asc"?1:-1):0;
    });
}

function sb(k){if(sk===k)sd=sd==="asc"?"desc":"asc";else{sk=k;sd="asc";}render();}
function ar(c){if(sk!==c)return` <span style="opacity:.2;font-size:9px">&#8645;</span>`;return sd==="asc"?` <span style="font-size:9px;color:var(--accent)">&#8593;</span>`:` <span style="font-size:9px;color:var(--accent)">&#8595;</span>`;}

function render(){
  const data=gf(),wrap=document.getElementById("tw");
  if(!data.length){wrap.innerHTML=`<div class="empty">No opportunities match your filters.</div>`;document.getElementById("tally").textContent="";return;}
  const cols=[
    {k:"company",l:"Company",w:"11%"},
    {k:"useCase",l:"Use case",w:"10%"},
    {k:"owner",l:"Owner",w:"8%"},
    {k:"stage",l:"Stage",w:"11%"},
    {k:"priority",l:"Priority",w:"8%"},
    {k:"lastEngagement",l:"Last engagement",w:"9%"},
    {k:"country",l:"Country",w:"7%"},
    {k:"incentive",l:"Incentive",w:"14%"},
    {k:"notes",l:"Notes",w:"22%"},
  ];
  const thead=`<thead><tr>${cols.map(c=>`<th onclick="sb('${c.k}')" style="width:${c.w}">${c.l}${ar(c.k)}</th>`).join("")}</tr></thead>`;
  const tbody=data.map(d=>{
    const sc=SC[d.stage]||{bg:"#1a1a1a",t:"#9ca3af",d:"#4b5563"};
    const pc=PC[d.priority]||null;
    const badge=d.stage?`<span class="badge" style="background:${sc.bg};color:${sc.t}"><span class="bd" style="background:${sc.d}"></span>${d.stage}</span>`:`<span class="ns">-</span>`;
    const pLabel=d.priority.replace(" (Critical)","").replace(" (High Prio)","").replace(" (Medium Prio)","").replace(" (Low Prio)","");
    const prib=pc?`<span class="pri" style="background:${pc.bg};color:${pc.t}">${pLabel}</span>`:`<span class="ns">-</span>`;
    const engColor=engagementColor(d.lastEngagement);
    const engCell=d.lastEngagement?`<span class="${engColor}" style="font-family:'DM Mono',monospace;font-size:11px">${d.lastEngagement}</span>`:`<span class="ns">-</span>`;
    const incCell=d.incentive==="Yes"
      ?`<span class="inc-yes">&#10003; ${d.incentiveDesc||"Yes"}</span>`
      :d.incentive==="No"?`<span class="inc-no">No</span>`:`<span class="ns">-</span>`;
    const lnk=d.link?`<a class="lnk" href="${d.link}" target="_blank" rel="noreferrer">&#8599;</a>`:"";
    return`<tr>
      <td class="cp">${lnk}${d.company||"-"}</td>
      <td class="cm" title="${d.useCase||""}">${d.useCase||"-"}</td>
      <td class="cm">${d.owner||"-"}</td>
      <td>${badge}</td>
      <td>${prib}</td>
      <td>${engCell}</td>
      <td class="cm">${d.country||"-"}</td>
      <td class="cn" title="${(d.incentiveDesc||"").replace(/"/g,"&quot;")}">${incCell}</td>
      <td class="cn">${d.notes ? `<button class="note-btn" title="Click to expand" onclick="openNote('${d.company.replace(/'/g,"\\'")}','${d.notes.replace(/'/g,"\\'").replace(/\n/g," ")}')">${d.notes}</button>` : '-'}</td>
    </tr>`;
  }).join("");
  wrap.innerHTML=`<table><colgroup>${cols.map(c=>`<col style="width:${c.w}">`).join("")}</colgroup>${thead}<tbody>${tbody}</tbody></table>`;
  document.getElementById("tally").textContent=`Showing ${data.length} of ${RAW.length} opportunities`;
}

function exportCSV(){
  const data=gf();
  const h=["Company","Opportunity","Use Case","Owner","Stage","Priority","Last Engagement","Country","Region","Incentive","Incentive Description","Notes","HubSpot Link"];
  const rows=data.map(d=>[`"${d.company}"`,`"${d.deal}"`,`"${d.useCase}"`,d.owner,d.stage,d.priority,d.lastEngagement,d.country,d.region,d.incentive,`"${(d.incentiveDesc||"").replace(/"/g,'""')}"`,`"${(d.notes||"").replace(/"/g,'""')}"`,d.link]);
  const csv=[h,...rows].map(r=>r.join(",")).join("\n");
  const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  const a=document.createElement("a");a.href=url;a.download=`latam_bd_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);
}

buildFilters();buildSbar();render();

function openNote(company, text) {
  document.getElementById('modalTitle').textContent = company;
  document.getElementById('modalBody').textContent = text;
  document.getElementById('noteModal').classList.add('open');
}
function closeModal(e) {
  if(e.target.id === 'noteModal') document.getElementById('noteModal').classList.remove('open');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('noteModal').classList.remove('open'); });
</script>

<div class="modal-overlay" id="noteModal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('noteModal').classList.remove('open')">&#10005;</button>
    <h3 id="modalTitle"></h3>
    <p id="modalBody"></p>
  </div>
</div>
