// ── Multi-select filter state ─────────────────────────────────────────────────
const SEL = {stage:new Set(), owner:new Set(), country:new Set(), priority:new Set(), useCase:new Set(), incentive:new Set()};

function getOpts(key) {
  if(key==="stage") return SO.filter(s=>RAW.some(d=>d.stage===s));
  if(key==="priority") return ["P0 (Critical)","P1 (High Prio)","P2 (Medium Prio)","P3 (Low Prio)"].filter(p=>RAW.some(d=>d.priority===p));
  if(key==="incentive") return ["Yes","No"].filter(v=>RAW.some(d=>d.incentive===v));
  return [...new Set(RAW.map(d=>d[key]).filter(Boolean))].sort();
}

function buildDropdowns() {
  const keys = ["stage","owner","country","priority","useCase","incentive"];
  keys.forEach(key => {
    const dd = document.getElementById("dd-"+key);
    const opts = getOpts(key);
    dd.innerHTML = `<div class="ms-all" onclick="selectAll('${key}')">Select all</div><div class="ms-all" onclick="clearSel('${key}')">Clear</div><div class="ms-divider"></div>` +
      opts.map(o => `<label class="ms-item"><input type="checkbox" value="${o}" onchange="toggle('${key}','${o}')" id="cb-${key}-${encodeURIComponent(o)}">${o}</label>`).join("");
  });
}

function toggle(key, val) {
  if(SEL[key].has(val)) SEL[key].delete(val); else SEL[key].add(val);
  updateBtn(key); render();
}
function selectAll(key) {
  getOpts(key).forEach(o => { SEL[key].add(o); const cb=document.getElementById("cb-"+key+"-"+encodeURIComponent(o)); if(cb)cb.checked=true; });
  updateBtn(key); render();
}
function clearSel(key) {
  SEL[key].clear();
  getOpts(key).forEach(o => { const cb=document.getElementById("cb-"+key+"-"+encodeURIComponent(o)); if(cb)cb.checked=false; });
  updateBtn(key); render();
}
function updateBtn(key) {
  const btn = document.getElementById("btn-"+key);
  const labels = {stage:"Stage",owner:"Owner",country:"Country",priority:"Priority",useCase:"Use case",incentive:"Incentive"};
  if(SEL[key].size===0) {
    btn.textContent = labels[key]+" "; btn.innerHTML += '<span class="ms-arrow">&#9660;</span>';
    btn.classList.remove("active");
  } else {
    btn.textContent = labels[key]+" ("+SEL[key].size+") ";
    btn.innerHTML += '<span class="ms-arrow">&#9660;</span>';
    btn.classList.add("active");
  }
  // Show/hide clear filters button
  const anyActive = Object.values(SEL).some(s=>s.size>0) || document.getElementById("search").value;
  document.getElementById("clearBtn").style.display = anyActive ? "inline-flex" : "none";
}

function toggleDD(key) {
  const dd = document.getElementById("dd-"+key);
  const isOpen = dd.classList.contains("open");
  // Close all
  document.querySelectorAll(".ms-dropdown").forEach(d=>d.classList.remove("open"));
  if(!isOpen) dd.classList.add("open");
}
// Close dropdowns when clicking outside
document.addEventListener("click", e => {
  if(!e.target.closest(".ms-wrap")) document.querySelectorAll(".ms-dropdown").forEach(d=>d.classList.remove("open"));
});

function clearFilters() {
  Object.keys(SEL).forEach(k=>clearSel(k));
  document.getElementById("search").value="";
  document.getElementById("clearBtn").style.display="none";
  render();
}

// ── Stage bar ─────────────────────────────────────────────────────────────────
let sk="lastEngagement",sd="desc";

function buildSbar(){
  const cnt={};RAW.forEach(d=>{if(d.stage)cnt[d.stage]=(cnt[d.stage]||0)+1;});
  document.getElementById("sbar").innerHTML=SO.filter(s=>cnt[s]).map(s=>{
    const c=SC[s]||{bg:"#1a1a1a",t:"#9ca3af",d:"#4b5563"};
    const on = SEL.stage.has(s);
    return`<button class="sc${on?" on":""}" onclick="stageClick('${s}')" style="color:${c.t};${on?`background:${c.bg};border-color:${c.t};`:""}">${s}<span class="cc" style="background:${c.d}">${cnt[s]}</span></button>`;
  }).join("");
}

function stageClick(s) {
  const cb = document.getElementById("cb-stage-"+encodeURIComponent(s));
  if(SEL.stage.has(s)) { SEL.stage.delete(s); if(cb)cb.checked=false; }
  else { SEL.stage.add(s); if(cb)cb.checked=true; }
  updateBtn("stage"); buildSbar(); render();
}

// ── Filter + sort ─────────────────────────────────────────────────────────────
function gf(){
  const q=document.getElementById("search").value.toLowerCase();
  return RAW
    .filter(d=>SEL.stage.size===0||SEL.stage.has(d.stage))
    .filter(d=>SEL.owner.size===0||SEL.owner.has(d.owner))
    .filter(d=>SEL.country.size===0||SEL.country.has(d.country))
    .filter(d=>SEL.priority.size===0||SEL.priority.has(d.priority))
    .filter(d=>SEL.useCase.size===0||SEL.useCase.has(d.useCase))
    .filter(d=>SEL.incentive.size===0||SEL.incentive.has(d.incentive))
    .filter(d=>!q||[d.company,d.deal,d.useCase,d.owner,d.notes,d.incentiveDesc,d.country].join(" ").toLowerCase().includes(q))
    .sort((a,b)=>{let av=sk==="stage"?SO.indexOf(a.stage||""):(a[sk]||""),bv=sk==="stage"?SO.indexOf(b.stage||""):(b[sk]||"");return av<bv?(sd==="asc"?-1:1):av>bv?(sd==="asc"?1:-1):0;});
}

function sb(k){if(sk===k)sd=sd==="asc"?"desc":"asc";else{sk=k;sd="asc";}render();}
function ar(k){if(sk!==k)return" <span style=\"opacity:.2;font-size:9px\">&#8645;</span>";return sd==="asc"?" <span style=\"font-size:9px;color:var(--accent)\">&#8593;</span>":" <span style=\"font-size:9px;color:var(--accent)\">&#8595;</span>";}

function daysSince(s){if(!s)return null;return Math.floor((new Date()-new Date(s))/(1000*60*60*24));}
function engColor(s){const d=daysSince(s);if(d===null)return"ns";if(d<=14)return"ok";if(d<=30)return"warn";return"stale";}

function openNote(idx){const d=window._nd[idx];document.getElementById("modalTitle").textContent=d.company;document.getElementById("modalBody").textContent=d.notes;document.getElementById("noteModal").classList.add("open");}
function closeModal(e){if(e.target.id==="noteModal")document.getElementById("noteModal").classList.remove("open");}
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.getElementById("noteModal").classList.remove("open");});

function render(){
  const data=gf(); window._nd=data;
  const wrap=document.getElementById("tw");
  buildSbar();
  if(!data.length){wrap.innerHTML=`<div class="empty">No opportunities match your filters.</div>`;document.getElementById("tally").textContent="";return;}
  const cols=[{k:"company",l:"Company",w:"11%"},{k:"useCase",l:"Use case",w:"10%"},{k:"owner",l:"Owner",w:"8%"},{k:"stage",l:"Stage",w:"11%"},{k:"priority",l:"Priority",w:"8%"},{k:"lastEngagement",l:"Last engagement",w:"9%"},{k:"country",l:"Country",w:"7%"},{k:"incentive",l:"Incentive",w:"14%"},{k:"notes",l:"Notes",w:"22%"}];
  const thead=`<thead><tr>${cols.map(c=>`<th onclick="sb('${c.k}')" style="width:${c.w}">${c.l}${ar(c.k)}</th>`).join("")}</tr></thead>`;
  const tbody=data.map((d,i)=>{
    const sc=SC[d.stage]||{bg:"#1a1a1a",t:"#9ca3af",d:"#4b5563"};
    const pc=PC[d.priority]||null;
    const badge=d.stage?`<span class="badge" style="background:${sc.bg};color:${sc.t}"><span class="bd" style="background:${sc.d}"></span>${d.stage}</span>`:`<span class="ns">-</span>`;
    const pLabel=d.priority.replace(" (Critical)","").replace(" (High Prio)","").replace(" (Medium Prio)","").replace(" (Low Prio)","");
    const prib=pc?`<span class="pri" style="background:${pc.bg};color:${pc.t}">${pLabel}</span>`:`<span class="ns">-</span>`;
    const ec=engColor(d.lastEngagement);
    const engCell=d.lastEngagement?`<span class="${ec}" style="font-family:'DM Mono',monospace;font-size:11px">${d.lastEngagement}</span>`:`<span class="ns">-</span>`;
    const incCell=d.incentive==="Yes"?`<span class="inc-yes">&#10003; ${d.incentiveDesc||"Yes"}</span>`:d.incentive==="No"?`<span class="inc-no">No</span>`:`<span class="ns">-</span>`;
    const lnk=d.link?`<a class="lnk" href="${d.link}" target="_blank" rel="noreferrer">&#8599;</a>`:"";
    const noteCell=d.notes?`<button class="note-btn" onclick="openNote(${i})">${d.notes}</button>`:`<span class="ns">-</span>`;
    return`<tr><td class="cp">${lnk}${d.company||"-"}</td><td class="cm">${d.useCase||"-"}</td><td class="cm">${d.owner||"-"}</td><td>${badge}</td><td>${prib}</td><td>${engCell}</td><td class="cm">${d.country||"-"}</td><td class="cn">${incCell}</td><td>${noteCell}</td></tr>`;
  }).join("");
  wrap.innerHTML=`<table><colgroup>${cols.map(c=>`<col style="width:${c.w}">`).join("")}</colgroup>${thead}<tbody>${tbody}</tbody></table>`;
  document.getElementById("tally").textContent=`Showing ${data.length} of ${RAW.length} opportunities`;
}

function exportCSV(){
  const data=gf();
  const h=["Company","Opportunity","Use Case","Owner","Stage","Priority","Last Engagement","Country","Region","Incentive","Incentive Description","Notes","HubSpot Link"];
  const qq=s=>'"'+String(s||"").replace(/"/g,'""')+'"';
  const rows=data.map(d=>[qq(d.company),qq(d.deal),qq(d.useCase),d.owner,d.stage,d.priority,d.lastEngagement,d.country,d.region,d.incentive,qq(d.incentiveDesc),qq(d.notes),d.link]);
  const csv=[h,...rows].map(r=>r.join(",")).join("\n");
  const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  const a=document.createElement("a");a.href=url;a.download="latam_bd_"+new Date().toISOString().slice(0,10)+".csv";a.click();URL.revokeObjectURL(url);
}

const active=RAW.filter(d=>d.stage&&!["10. Disqualified","9. Disengaged"].includes(d.stage)).length;
document.getElementById("meta").textContent=RAW.length+" opportunities - "+active+" active - Synced "+LAST_SYNCED;
buildDropdowns();
buildSbar();
render();
</script>
</body>
</html>
